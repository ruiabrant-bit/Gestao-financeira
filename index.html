<script>
const MO=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const uid=()=>Math.random().toString(36).slice(2,9);
const fmt=n=>new Intl.NumberFormat('pt-PT',{style:'currency',currency:'EUR'}).format(n||0);
const toN=s=>{if(typeof s==='number')return isNaN(s)?0:s;return parseFloat(String(s).replace(/[€\s]/g,'').replace(',','.'))||0;};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const r2=n=>Math.round(n*100)/100;

const S={yr:new Date().getFullYear(),mo:new Date().getMonth(),tab:'resumo',months:{},projects:[],insurance:[],portfolio:{categories:[],objetivo:0},fctable:{initialBalance:0,rows:[]},projId:null,busy:false};

// ── EXPORT / IMPORT ──────────────────────────────────────────────────────────
function exportData(){
  const data={months:S.months,projects:S.projects,insurance:S.insurance,portfolio:S.portfolio,fctable:S.fctable};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='gestao-financeira-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
}

function importData(ev){
  const file=ev.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(data.months)S.months=data.months;
      if(data.projects)S.projects=data.projects;
      if(data.insurance)S.insurance=data.insurance;
      if(data.portfolio)S.portfolio=data.portfolio;
      if(data.fctable)S.fctable=data.fctable;
      saveLS();render();
      alert('Dados importados com sucesso!');
    }catch(err){alert('Erro ao importar: ficheiro inválido.');}
    ev.target.value='';
  };
  reader.readAsText(file);
}

// ── FIREBASE SYNC ─────────────────────────────────────────────────────────────
let db=null;
let fbUnsub=null;
let isSyncing=false;
const fbUserId=(()=>{let id=localStorage.getItem('gf:uid');if(!id){id=uid();localStorage.setItem('gf:uid',id);}return id;})();

function setSyncStatus(st){
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('sync-label');
  if(!dot||!lbl)return;
  const map={ok:['🟢','Sincronizado'],syncing:['🔵','A sincronizar…'],error:['🔴','Erro Firebase'],off:['⚪','Sem Firebase']};
  const[d,l]=map[st]||map.off;
  dot.textContent=d;lbl.textContent=l;
}

function initFirebase(cfg){
  try{
    // Clean up existing
    if(fbUnsub){fbUnsub();fbUnsub=null;}
    if(firebase.apps.length)firebase.apps.forEach(a=>a.delete());
    
    firebase.initializeApp(cfg);
    db=firebase.firestore();
    db.settings({merge:true});
    
    // Real-time listener
    fbUnsub=db.collection('gf').doc(fbUserId).onSnapshot(doc=>{
      if(isSyncing)return;
      if(doc.exists){
        const data=doc.data();
        let changed=false;
        if(data.months){S.months=data.months;changed=true;}
        if(data.projects){S.projects=data.projects;changed=true;}
        if(data.insurance){S.insurance=data.insurance;changed=true;}
        if(data.portfolio){S.portfolio=data.portfolio;changed=true;}
        if(data.fctable){S.fctable=data.fctable;changed=true;}
        if(changed){saveLS();if(!S.busy)render();}
        setSyncStatus('ok');
      }
    },err=>{console.error('FB listener error:',err);setSyncStatus('error');});
    
    setSyncStatus('ok');
    return true;
  }catch(e){
    console.error('Firebase init error:',e);
    setSyncStatus('error');
    return false;
  }
}

function syncToFirebase(){
  if(!db)return;
  isSyncing=true;
  setSyncStatus('syncing');
  db.collection('gf').doc(fbUserId).set({
    months:S.months,
    projects:S.projects,
    insurance:S.insurance,
    portfolio:S.portfolio,
    fctable:S.fctable,
    ts:firebase.firestore.FieldValue.serverTimestamp()
  },{merge:true})
  .then(()=>{setSyncStatus('ok');})
  .catch(e=>{console.error('FB sync error:',e);setSyncStatus('error');})
  .finally(()=>{isSyncing=false;});
}

function showFbSettings(){
  const modal=document.getElementById('fb-modal');
  const inp=document.getElementById('fb-config-input');
  const uidEl=document.getElementById('fb-uid-display');
  const saved=localStorage.getItem('gf:fbcfg');
  if(saved)try{inp.value=JSON.stringify(JSON.parse(saved),null,2);}catch{}
  if(uidEl)uidEl.textContent='ID do dispositivo: '+fbUserId+' (partilha este ID noutros dispositivos para aceder aos mesmos dados)';
  modal.classList.add('open');
}

function closeFbModal(){
  document.getElementById('fb-modal').classList.remove('open');
}

function saveFbConfig(){
  const raw=document.getElementById('fb-config-input').value.trim();
  if(!raw){alert('Cola o teu firebaseConfig primeiro.');return;}
  try{
    // Extract all key:"value" pairs directly - works with any format
    const cfg={};
    const re=/["']?([a-zA-Z_][a-zA-Z0-9_]*)["']?\s*:\s*["']([^"']+)["']/g;
    let m;
    while((m=re.exec(raw))!==null){cfg[m[1]]=m[2];}
    if(!cfg.apiKey||!cfg.projectId){
      alert('Não encontrei apiKey ou projectId.\nVerifica que copiaste correctamente o firebaseConfig.');
      return;
    }
    localStorage.setItem('gf:fbcfg',JSON.stringify(cfg));
    if(initFirebase(cfg)){
      syncToFirebase();
      alert('Firebase conectado! Os dados sincronizam automaticamente.');
      closeFbModal();
    }else{
      alert('Erro ao conectar. Verifica se criaste o Firestore Database (modo de teste).');
    }
  }catch(e){
    alert('Erro: '+e.message);
  }
}

function disconnectFb(){
  if(!confirm('Desligar Firebase? Os dados ficam guardados localmente.'))return;
  localStorage.removeItem('gf:fbcfg');
  if(fbUnsub){fbUnsub();fbUnsub=null;}
  db=null;
  setSyncStatus('off');
  closeFbModal();
}

function loadLS(){
  try{const m=localStorage.getItem('gf:months');if(m)S.months=JSON.parse(m);}catch{}
  try{const p=localStorage.getItem('gf:projects');if(p)S.projects=JSON.parse(p);}catch{}
  try{const i=localStorage.getItem('gf:insurance');if(i)S.insurance=JSON.parse(i);}catch{}
  try{const w=localStorage.getItem('gf:portfolio');if(w){S.portfolio=JSON.parse(w);if(!Array.isArray(S.portfolio.categories))S.portfolio.categories=[];}}catch{}
  try{const ft=localStorage.getItem('gf:fctable');if(ft){S.fctable=JSON.parse(ft);
    if(!S.fctable.goals)S.fctable.goals=[{id:'g2026',year:2026,target:0},{id:'g2027',year:2027,target:0}];
    if(!S.fctable.months)S.fctable.months=[];
  }}catch{}
}
function saveLS(){
  try{localStorage.setItem('gf:months',JSON.stringify(S.months));}catch{}
  try{localStorage.setItem('gf:projects',JSON.stringify(S.projects));}catch{}
  try{localStorage.setItem('gf:insurance',JSON.stringify(S.insurance));}catch{}
  try{localStorage.setItem('gf:portfolio',JSON.stringify(S.portfolio));}catch{}
  try{localStorage.setItem('gf:fctable',JSON.stringify(S.fctable));}catch{}
  // Sync to Firebase if connected
  if(db)syncToFirebase();
}

function initMonths(){
  // Eliminar meses anteriores a Maio 2026 (orçamento mensal)
  Object.keys(S.months).forEach(k=>{
    const[y,m]=k.split('-').map(Number);
    if(y<2026||(y===2026&&m<4)) delete S.months[k];
  });
  // Eliminar meses anteriores a Maio 2026 (forecast)
  if(S.fctable&&S.fctable.months){
    S.fctable.months=S.fctable.months.filter(m=>
      m.moYr===undefined||(m.moYr>2026||(m.moYr===2026&&m.moIdx>=4))
    );
  }
  // Criar meses de Maio 2026 a Maio 2027 (inclusive)
  const ranges=[
    {yr:2026,ms:4,me:11},
    {yr:2027,ms:0,me:4},
  ];
  ranges.forEach(({yr,ms,me})=>{
    for(let m=ms;m<=me;m++){
      const k=yr+"-"+m;
      if(!S.months[k])S.months[k]=newMonth();
      else if(S.months[k].fc&&S.months[k].fc.savingsTransferred===undefined)
        S.months[k].fc.savingsTransferred=false;
    }
  });
  saveLS();
}

// ── CÁLCULOS (idênticos ao Excel) ────────────────────────────────────────────
// Fórmulas:
//   Total despesas = fixas + variáveis(previsão) + extras + poupança
//   Pago = fixas pagas + variáveis pagas + extras pagas + (poupança se transferida)
//   Falta pagar = Total despesas − Pago
//   Margem = Saldo actual − Falta pagar − Objectivo conta corrente
function tots(d){
  const fc=d.fc||{};
  const tF=r2(d.fixed.reduce((s,f)=>s+f.amount,0));
  const pF=r2(d.fixed.filter(f=>f.paid).reduce((s,f)=>s+f.amount,0));
  const tV=r2(d.variable.reduce((s,v)=>s+v.forecast,0));
  const pV=r2(d.variable.reduce((s,v)=>s+v.paid,0));
  const tE=r2(d.extras.reduce((s,e)=>s+e.amount,0));
  const pE=r2(d.extras.filter(e=>e.paid).reduce((s,e)=>s+e.amount,0));
  const sv=r2(fc.savings||0);
  const svP=fc.savingsTransferred?sv:0;
  const tExp=r2(tF+tV+tE+sv);
  const tPaid=r2(pF+svP+pV+pE);
  const unp=r2(tExp-tPaid);
  const mrg=r2((fc.currentBalance||0)-unp-(fc.objective||0));
  return{tF,pF,tV,pV,tE,pE,sv,svP,tExp,tPaid,unp,mrg};
}

function C(t,id,f,val,num,w){
  const empty=num?(!val&&val!==0):!val;
  const disp=num?fmt(val):(val?esc(val):'');

  return `<span class="ec${empty?' mt':''}" data-t="${t}" data-id="${esc(String(id))}" data-f="${f}" data-n="${num?1:0}"${st}>${disp||'<i style="opacity:.35">—</i>'}</span>`;
}

// ── FORECAST TABLE ────────────────────────────────────────────────────────────
function rForecastTab(){
  const ft=S.fctable;
  const months=(ft.months||[]);
  const goals=(ft.goals||[]);
  const initBal=Number(ft.initialBalance)||0;

  // Running saldo per month
  let runSaldo=initBal;
  const calc=months.map(m=>{
    const entries=m.entries||[];
    const totP=entries.filter(e=>e.type==='proveito').reduce((s,e)=>s+(Number(e.amount)||0),0);
    const totD=entries.filter(e=>e.type==='despesa').reduce((s,e)=>s+(Number(e.amount)||0),0);
    const saldoInicio=runSaldo;
    const saldoFim=Math.round((runSaldo+totP-totD)*100)/100;
    runSaldo=saldoFim;
    return{...m,entries,totP:Math.round(totP*100)/100,totD:Math.round(totD*100)/100,saldoInicio,saldoFim};
  });

  const allP=Math.round(calc.reduce((s,m)=>s+m.totP,0)*100)/100;
  const allD=Math.round(calc.reduce((s,m)=>s+m.totD,0)*100)/100;
  const finalSaldo=calc.length?calc[calc.length-1].saldoFim:initBal;

  // Carteira current net position
  const cartCats=(S.portfolio&&S.portfolio.categories)||[];
  let cartPos=0,cartNeg=0;
  cartCats.forEach(cat=>{(cat.items||[]).forEach(i=>{const a=parseFloat(i.amount)||0;i.sign==='+'?cartPos+=a:cartNeg+=a;});});
  const cartNet=Math.round((cartPos-cartNeg)*100)/100;

  // Net income/savings change from forecast months for a given year
  function netChangeForYear(yr){
    const ymonths=calc.filter(m=>m.moYr===yr);
    if(!ymonths.length)return null;
    return Math.round(ymonths.reduce((s,m)=>s+m.totP-m.totD,0)*100)/100;
  }

  // ── Goals section ──────────────────────────────────────────────────────────
  const goalBlocks=goals.map((g,gi)=>{
    const target=Number(g.target)||0;
    const netChange=netChangeForYear(g.year); // net P-D from forecast months (null if no months)
    const hasProj=netChange!==null;

    // Projected total position = Carteira atual + variação líquida do forecast
    const projectedTotal=hasProj?Math.round((cartNet+netChange)*100)/100:null;

    // Falta hoje = Objectivo − Posição actual (Carteira)
    const gapHoje=Math.round((target-cartNet)*100)/100;

    // Falta fim ano = Objectivo − Posição actual − Saldo previsto (variação forecast)
    // = target - cartNet - netChange
    const gapFimAno=hasProj?Math.round((target-cartNet-netChange)*100)/100:null;

    // Progress bar: current position vs target
    const pct=target!==0?Math.min(200,Math.round((cartNet/target)*100)):0;
    const progressW=Math.min(100,Math.max(0,pct));
    const progressCol=pct>=100?'var(--green)':pct>=70?'var(--accent)':'var(--red)';

    const faltaHojeColor=gapHoje<=0?'var(--green)':'var(--red)';
    const faltaFimColor=gapFimAno!==null?(gapFimAno<=0?'var(--green)':'var(--red)'):'var(--mut)';

    return`<div class="card p22" style="border-color:rgba(232,164,74,.2)">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;flex-wrap:wrap;gap:16px">
        <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
          <div>
            <div class="ml" style="margin-bottom:4px">Ano</div>
            <input class="goal-inp" type="number" data-gid="${g.id}" data-fld="year"
              value="${g.year}" min="2020" max="2050" step="1"
              style="background:var(--card2);border:1px solid rgba(232,164,74,.3);border-radius:6px;color:var(--accent);font-family:var(--fs);font-size:20px;font-weight:600;outline:none;width:90px;padding:4px 8px;text-align:center">
          </div>
          <div>
            <div class="ml" style="margin-bottom:4px">Objectivo (€)</div>
            <input class="goal-inp" type="number" step="0.01" data-gid="${g.id}" data-fld="target"
              value="${target}" placeholder="0"
              style="background:var(--card2);border:1px solid rgba(232,164,74,.3);border-radius:6px;color:var(--txt);font-family:var(--ff);font-size:15px;font-weight:700;outline:none;width:150px;padding:4px 10px;text-align:right">
          </div>
        </div>
        <div style="display:flex;gap:20px;flex-wrap:wrap">
          <div class="mcard" style="padding:10px 14px;min-width:130px">
            <div class="ml" style="margin-bottom:4px">Posição actual (Carteira)</div>
            <div style="font-size:15px;font-weight:800;color:${cartNet>=0?'var(--green)':'var(--red)'}">${cartNet>=0?'+':''}${fmt(cartNet)}</div>
          </div>
          <div class="mcard" style="padding:10px 14px;min-width:130px">
            <div class="ml" style="margin-bottom:4px">Falta / Excesso hoje</div>
            <div style="font-size:15px;font-weight:800;color:${faltaHojeColor}">${gapHoje<=0?'✓ +'+fmt(Math.abs(gapHoje)):fmt(gapHoje)+' em falta'}</div>
          </div>
          ${hasProj?`
          <div class="mcard" style="padding:10px 14px;min-width:130px">
            <div class="ml" style="margin-bottom:4px">Saldo previsto fim ${g.year}</div>
            <div style="font-size:15px;font-weight:800;color:${projectedTotal>=0?'var(--green)':'var(--red)'}">${projectedTotal>=0?'+':''}${fmt(projectedTotal)}</div>
            <div style="font-size:10px;color:var(--mut2);margin-top:3px">Carteira + variação forecast</div>
          </div>
          <div class="mcard" style="padding:10px 14px;min-width:130px">
            <div class="ml" style="margin-bottom:4px">Falta / Excesso fim ${g.year}</div>
            <div style="font-size:15px;font-weight:800;color:${faltaFimColor}">${gapFimAno<=0?'✓ +'+fmt(Math.abs(gapFimAno)):fmt(gapFimAno)+' em falta'}</div>
            <div style="font-size:10px;color:var(--mut2);margin-top:3px">Obj − Carteira − Forecast</div>
          </div>`:''}
        </div>
        ${gi>0?`<button data-act="dgoal" data-gid="${g.id}" style="background:none;border:none;color:var(--mut2);cursor:pointer;font-size:15px;opacity:.5">✕</button>`:''}
      </div>

      ${target>0?`
      <div style="margin-bottom:6px;display:flex;justify-content:space-between;font-size:12px;color:var(--mut2)">
        <span>Posição actual vs Objectivo ${g.year}</span>
        <span style="font-weight:700;color:${progressCol}">${pct}%</span>
      </div>
      <div style="background:var(--card2);border-radius:8px;height:10px;overflow:hidden;margin-bottom:8px;position:relative">
        <div style="width:${progressW}%;height:100%;background:${progressCol};border-radius:8px;transition:width .5s"></div>
      </div>
      <div style="font-size:11px;color:var(--mut2)">
        ${fmt(cartNet)} de ${fmt(target)} hoje · ${pct>=100?'Objectivo já atingido 🎉':'faltam '+fmt(Math.max(0,gapHoje))+' com a posição actual'}
        ${hasProj?'· Com forecast: posição prevista '+fmt(projectedTotal)+' (falta '+fmt(Math.max(0,gapFimAno))+')':'· Sem meses de forecast para '+g.year}
      </div>`:'<div style="font-size:12px;color:var(--mut2)">Define um objectivo para ver o progresso</div>'}
    </div>`;
  }).join('');

  // ── Month blocks ─────────────────────────────────────────────────────────
  const mblocks=calc.map(m=>{
    const entries=m.entries||[];
    const erows=entries.map(e=>`<tr>
      <td style="padding:6px 14px">
        <button class="signbtn ${e.type==='proveito'?'pos':'neg'}" data-act="tfce" data-id="${m.id}:${e.id}">${e.type==='proveito'?'+':'−'}</button>
        ${C('fct',m.id+':'+e.id,'name',e.name,false)}
      </td>
      <td style="padding:6px 14px">${C('fct',m.id+':'+e.id,'amount',e.amount,true)}</td>
      <td style="padding:6px 14px;font-weight:700;color:${e.type==='proveito'?'var(--green)':'var(--red)'}">
        ${e.type==='proveito'?'+':'−'}${fmt(Number(e.amount)||0)}
      </td>
      <td style="padding:6px 14px"><button class="xb" data-act="dfce" data-id="${m.id}:${e.id}">✕</button></td>
    </tr>`).join('');

    const saldoColor=m.saldoFim>=0?'var(--green)':'var(--red)';
    const delta=Math.round((m.saldoFim-m.saldoInicio)*100)/100;

    return`<div class="card">
      <div class="chdr">
        <span class="cnm">${C('fct',m.id,'name',m.name,false)}</span>
        <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
          <span style="font-size:12px;color:var(--mut)">Proveitos: <span class="g w8">+${fmt(m.totP)}</span></span>
          <span style="font-size:12px;color:var(--mut)">Despesas: <span class="r w8">−${fmt(m.totD)}</span></span>
          <span style="font-size:12px;color:var(--mut)">Saldo fim: <span style="font-weight:800;color:${saldoColor}">${m.saldoFim>=0?'+':''}${fmt(m.saldoFim)}</span></span>
          <button class="xb" style="opacity:.5!important;display:inline-block" data-act="dfcm" data-id="${m.id}">✕</button>
        </div>
      </div>
      <div style="padding:8px 14px;font-size:12px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--bdr);display:flex;gap:20px;flex-wrap:wrap">
        <span style="color:var(--mut2)">Saldo início: <strong style="color:${m.saldoInicio>=0?'var(--green)':'var(--red)'}">${m.saldoInicio>=0?'+':''}${fmt(m.saldoInicio)}</strong></span>
        <span style="color:var(--mut2)">Variação: <strong style="color:${delta>=0?'var(--green)':'var(--red)'}">${delta>=0?'+':''}${fmt(delta)}</strong></span>
        <span style="color:var(--mut2)">Saldo fim: <strong style="color:${saldoColor}">${m.saldoFim>=0?'+':''}${fmt(m.saldoFim)}</strong></span>
      </div>
      <table>
        <thead><tr><th style="width:46%">Descrição</th><th>Valor</th><th>Impacto</th><th style="width:36px"></th></tr></thead>
        <tbody>${erows||`<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--mut2)">Sem entradas</td></tr>`}</tbody>
        ${entries.length?`<tfoot><tr class="tfd"><td style="font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px">Variação mês</td><td></td><td style="color:${delta>=0?'var(--green)':'var(--red)'}">${delta>=0?'+':''}${fmt(delta)}</td><td></td></tr></tfoot>`:''}
      </table>
      <div class="brow" style="display:flex;gap:8px">
        <button class="ab" data-act="afce" data-id="${m.id}" data-tp="proveito" style="color:var(--green);border-color:rgba(76,175,136,.4);background:rgba(76,175,136,.08)">+ Proveito</button>
        <button class="ab" data-act="afce" data-id="${m.id}" data-tp="despesa" style="color:var(--red);border-color:rgba(224,92,92,.4);background:rgba(224,92,92,.08)">+ Despesa</button>
      </div>
    </div>`;
  }).join('');

  // Mini chart
  const chartH=70;
  const maxAbs=Math.max(...calc.map(m=>Math.abs(m.saldoFim)),1);
  const bars=calc.map(m=>{
    const pct=Math.min(100,Math.abs(m.saldoFim)/maxAbs*100);
    const col=m.saldoFim>=0?'var(--green)':'var(--red)';
    const bw=Math.max(10,Math.min(40,Math.floor(520/Math.max(calc.length,1))-4));
    const lbl=Math.abs(m.saldoFim)>=1000?Math.round(m.saldoFim/1000)+'k':Math.round(m.saldoFim);
    return`<div style="display:inline-flex;flex-direction:column;align-items:center;gap:3px;margin:0 2px">
      <div style="font-size:9px;color:var(--mut2);font-weight:700">${m.saldoFim>=0?'+':''}${lbl}</div>
      <div style="width:${bw}px;height:${Math.max(3,Math.round(pct/100*chartH))}px;background:${col};border-radius:3px 3px 0 0"></div>
      <div style="font-size:9px;color:var(--mut2);white-space:nowrap;overflow:hidden;max-width:${bw+10}px;text-overflow:ellipsis" title="${m.name}">${m.name.split(' ')[0].slice(0,3)}</div>
    </div>`;
  }).join('');

  const chart=calc.length>1?`<div class="card p18">
    <div class="ml" style="margin-bottom:12px">Evolução do Saldo por Mês</div>
    <div style="display:flex;align-items:flex-end;min-height:${chartH+36}px;overflow-x:auto">${bars}</div>
  </div>`:'';

  return`<div class="grid">
  <div class="mgrid">
    <div class="mcard"><div class="ml">Saldo Inicial</div>${C('fct','_','initialBalance',ft.initialBalance,true)}</div>
    <div class="mcard" style="border-color:rgba(76,175,136,.2)"><div class="ml" style="color:var(--green)">Total Proveitos</div><div style="font-size:20px;font-weight:900;color:var(--green)">+${fmt(allP)}</div></div>
    <div class="mcard" style="border-color:rgba(224,92,92,.2)"><div class="ml" style="color:var(--red)">Total Despesas</div><div style="font-size:20px;font-weight:900;color:var(--red)">−${fmt(allD)}</div></div>
    <div class="mcard" style="border-color:rgba(232,164,74,.3)"><div class="ml">Saldo Final Previsto</div><div style="font-size:20px;font-weight:900;color:${finalSaldo>=0?'var(--green)':'var(--red)'}">${finalSaldo>=0?'+':''}${fmt(finalSaldo)}</div></div>
  </div>

  ${chart}

  <div style="display:flex;justify-content:space-between;align-items:center">
    <span style="font-family:var(--fs);font-size:16px;color:var(--accent);font-weight:600">🎯 Objectivos por Ano</span>
    <button class="ab" data-act="agoal" style="font-size:12px">+ Adicionar Ano</button>
  </div>
  ${goalBlocks}

  <div style="height:1px;background:var(--bdr);margin:4px 0"></div>
  <div style="display:flex;justify-content:space-between;align-items:center">
    <span style="font-family:var(--fs);font-size:16px;color:var(--accent);font-weight:600">📅 Meses</span>
    <button class="ab" data-act="afcm" style="font-size:13px">+ Adicionar Mês</button>
  </div>
  ${months.length===0?`<div class="card emp" style="padding:40px">
    <div style="font-size:40px;margin-bottom:12px">📅</div>
    <div style="font-size:14px;color:var(--mut);font-weight:700;margin-bottom:6px">Sem meses de forecast</div>
    <div style="font-size:13px;color:var(--mut2)">Adiciona meses e dentro de cada um insere proveitos e despesas previstas</div>
  </div>`:mblocks}
</div>`;
}


// ── CARTEIRA GLOBAL ───────────────────────────────────────────────────────────
function safePF(v){const x=parseFloat(String(v).replace(/[€\s]/g,'').replace(',','.'));return isNaN(x)?0:x;}

function rCarteira(){
  const cats=(S.portfolio&&S.portfolio.categories)||[];

  // Compute initial totals for rendering
  let tP=0,tN=0;
  cats.forEach(cat=>{(cat.items||[]).forEach(i=>{const a=safePF(i.amount);i.sign==='+'?tP+=a:tN+=a;});});
  tP=Math.round(tP*100)/100;tN=Math.round(tN*100)/100;
  const grand=Math.round((tP-tN)*100)/100;

  const cblocks=cats.map(cat=>{
    let cP=0,cN=0;
    (cat.items||[]).forEach(i=>{const a=safePF(i.amount);i.sign==='+'?cP+=a:cN+=a;});
    const cTot=Math.round((cP-cN)*100)/100;

    const rows=(cat.items||[]).map(item=>{
      const a=safePF(item.amount);
      return`<tr>
        <td style="vertical-align:middle;padding:6px 14px">
          <button class="signbtn ${item.sign==='+'?'pos':'neg'}" data-act="tpit" data-id="${cat.id}:${item.id}" title="Alternar +/−">${item.sign==='+'?'+':'−'}</button>
          <input class="pi-name" type="text" data-cid="${cat.id}" data-iid="${item.id}"
            value="${esc(item.name||'')}" placeholder="Descrição..."
            style="background:none;border:none;border-bottom:1px dashed rgba(232,164,74,.3);color:var(--txt);font-family:var(--ff);font-size:13px;outline:none;width:180px;padding:2px 4px">
        </td>
        <td style="padding:6px 14px">
          <div style="display:inline-flex;align-items:center;gap:4px">
            <input class="pi-amt" type="number" step="0.01" min="0" data-cid="${cat.id}" data-iid="${item.id}"
              value="${a}"
              style="background:none;border:none;border-bottom:1px dashed rgba(232,164,74,.3);color:var(--txt);font-family:var(--ff);font-size:13px;outline:none;width:95px;padding:2px 4px;text-align:right">
            <span style="font-size:12px;color:var(--mut2);font-weight:600">€</span>
          </div>
        </td>
        <td id="cimp-${cat.id}-${item.id}" style="font-weight:700;padding:6px 14px;color:${item.sign==='+'?'var(--green)':'var(--red)'}">
          ${item.sign==='+'?'+':'−'}${fmt(a)}
        </td>
        <td style="padding:6px 14px"><button class="xb" data-act="dpit" data-id="${cat.id}:${item.id}">✕</button></td>
      </tr>`;
    }).join('');

    return`<div class="card">
      <div class="chdr">
        <input class="pi-cat" type="text" data-cid="${cat.id}"
          value="${esc(cat.name||'')}" placeholder="Nome da categoria..."
          style="background:none;border:none;border-bottom:1px dashed rgba(232,164,74,.4);color:var(--accent);font-family:var(--fs);font-size:15px;font-weight:600;outline:none;min-width:120px;padding:2px 4px">
        <div style="display:flex;align-items:center;gap:14px">
          <span id="ctot-${cat.id}" style="font-weight:800;font-size:14px;color:${cTot>=0?'var(--green)':'var(--red)'}">${cTot>=0?'+':''}${fmt(cTot)}</span>
          <button class="xb" style="opacity:.5!important;display:inline-block" data-act="dcat" data-id="${cat.id}">✕</button>
        </div>
      </div>
      <table>
        <thead><tr><th style="width:46%">Designação</th><th>Valor €</th><th>Impacto</th><th style="width:36px"></th></tr></thead>
        <tbody>${rows||`<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--mut2)">Sem entradas</td></tr>`}</tbody>
        ${(cat.items||[]).length?`<tfoot><tr class="tfd"><td style="font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px">Total</td><td></td><td id="ctot2-${cat.id}" style="color:${cTot>=0?'var(--green)':'var(--red)'}">${cTot>=0?'+':''}${fmt(cTot)}</td><td></td></tr></tfoot>`:''}
      </table>
      <div class="brow"><button class="ab" data-act="apit" data-id="${cat.id}">+ Adicionar</button></div>
    </div>`;
  }).join('');

  const summary=cats.length>0?`
  <div class="card p22" style="border-color:rgba(232,164,74,.25)">
    <div class="mgrid" style="margin-bottom:18px">
      <div class="mcard" style="border-color:rgba(76,175,136,.2)">
        <div class="ml" style="color:var(--green)">Total Activos / Proveitos</div>
        <div id="cart-totp" style="font-size:20px;font-weight:900;color:var(--green)">+${fmt(tP)}</div>
      </div>
      <div class="mcard" style="border-color:rgba(224,92,92,.2)">
        <div class="ml" style="color:var(--red)">Total Passivos / Despesas</div>
        <div id="cart-totn" style="font-size:20px;font-weight:900;color:var(--red)">−${fmt(tN)}</div>
      </div>
      <div class="mcard" style="border-color:rgba(232,164,74,.3)">
        <div class="ml">Posição Líquida</div>
        <div id="cart-grand" style="font-size:20px;font-weight:900;color:${grand>=0?'var(--green)':'var(--red)'}">${grand>=0?'+':''}${fmt(grand)}</div>
      </div>
    </div>
    <div class="mbox" style="background:${grand>=0?'rgba(76,175,136,.08)':'rgba(224,92,92,.08)'}">
      <div>
        <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--mut2);margin-bottom:2px">Balanço Global</div>
        <div style="font-size:12px;color:var(--mut2)">Activos − Passivos</div>
      </div>
      <span id="cart-bal" style="font-size:28px;font-weight:900;color:${grand>=0?'var(--green)':'var(--red)'}">${grand>=0?'+':''}${fmt(grand)}</span>
    </div>
  </div>`:'';

  return`<div class="grid">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <span style="font-family:var(--fs);font-size:18px;color:var(--accent);font-weight:600">Carteira Global</span>
    <button class="ab" data-act="acat" style="font-size:13px">+ Nova Categoria</button>
  </div>
  ${cats.length===0?`<div class="card emp">
    <div style="font-size:48px;margin-bottom:14px">💼</div>
    <div style="font-size:15px;color:var(--mut);font-weight:700;margin-bottom:8px">Carteira vazia</div>
    <div style="font-size:13px;color:var(--mut2);max-width:380px;margin:0 auto">
      Cria categorias (ex: Poupanças, Investimentos, Dívidas) e adiciona entradas com sinal + ou −
    </div>
  </div>`:(cblocks+summary)}
</div>`;
}

// ── PROJECTOS ─────────────────────────────────────────────────────────────────
function rProjs(){
  const hdr=`<div style="display:flex;justify-content:space-between;align-items:center">
    <span style="font-family:var(--fs);font-size:18px;color:var(--accent);font-weight:600">Projectos</span>
    <button class="ab" data-act="aproj" style="font-size:13px">+ Novo Projecto</button>
  </div>`;
  if(!S.projects.length)return`<div class="grid">${hdr}<div class="card emp">
    <div style="font-size:48px;margin-bottom:14px">📁</div>
    <div style="font-size:15px;color:var(--mut);font-weight:700;margin-bottom:8px">Nenhum projecto criado</div>
    <div style="font-size:13px;color:var(--mut2);max-width:360px;margin:0 auto">Cria um projecto para uma viagem, compra importante ou qualquer objectivo com orçamento definido</div>
  </div></div>`;
  const cards=S.projects.map(p=>{
    const tot=r2(p.entries.reduce((s,e)=>s+e.amount,0));
    const paid=r2(p.entries.filter(e=>e.paid).reduce((s,e)=>s+e.amount,0));
    const prog=p.budget>0?Math.min(100,(tot/p.budget)*100):0;
    const pb=p.budget>0?`<div class="pt" style="margin-bottom:10px"><div class="pf" style="width:${prog}%;background:${prog>100?'var(--red)':prog>80?'var(--accent)':'var(--green)'}"></div></div>`:'';
    return`<div class="pc" data-act="oproj" data-id="${p.id}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
        <span style="font-family:var(--fs);font-size:16px;font-weight:600;line-height:1.3">${esc(p.name)}</span>
        <button data-act="dproj" data-id="${p.id}" style="background:none;border:none;color:#904040;cursor:pointer;font-size:14px;padding:0 4px;opacity:.6">✕</button>
      </div>
      <div style="display:flex;gap:16px;margin-bottom:${p.budget>0?12:10}px">
        <div><div style="font-size:9px;color:var(--mut2);text-transform:uppercase;letter-spacing:.6px;font-weight:800">Orçamento</div><div style="font-weight:700;color:var(--mut);font-size:14px">${fmt(p.budget)}</div></div>
        <div><div style="font-size:9px;color:var(--mut2);text-transform:uppercase;letter-spacing:.6px;font-weight:800">Gasto</div><div style="font-weight:700;color:var(--red);font-size:14px">${fmt(tot)}</div></div>
        <div><div style="font-size:9px;color:var(--mut2);text-transform:uppercase;letter-spacing:.6px;font-weight:800">Pago</div><div style="font-weight:700;color:var(--green);font-size:14px">${fmt(paid)}</div></div>
        <div><div style="font-size:9px;color:var(--mut2);text-transform:uppercase;letter-spacing:.6px;font-weight:800">Falta Pagar</div><div style="font-weight:700;font-size:14px;color:${r2((p.budget||0)-paid)<=0?'var(--green)':'var(--accent)'}">${fmt(Math.max(0,r2((p.budget||0)-paid)))}</div></div>
      </div>${pb}
      <div style="font-size:11px;color:var(--mut2)">${p.entries.length} entrada(s) · clique para abrir</div>
    </div>`;
  }).join('');
  return`<div class="grid">${hdr}<div class="pgrid">${cards}</div></div>`;
}

function rProjDetail(p){
  const entries=p.entries||[];
  const tot=r2(entries.reduce((s,e)=>s+(Number(e.amount)||0),0));
  const paid=r2(entries.filter(e=>e.paid).reduce((s,e)=>s+(Number(e.amount)||0),0));
  const unpaid=r2(tot-paid);                           // total planeado ainda não pago
  const faltaPagar=r2((p.budget||0)-paid);             // orçamento − já pago
  const prog=p.budget>0?Math.min(100,(tot/p.budget)*100):0;
  const rest=r2((p.budget||0)-tot);

  const rows=entries.map(e=>{
    const hasNotes=e.notes&&e.notes.trim();
    return`<tr>
      <td style="vertical-align:top">
        ${C('pe',`${p.id}:${e.id}`,'name',e.name,false)}
      </td>
      <td style="vertical-align:top;white-space:nowrap">${C('pe',`${p.id}:${e.id}`,'date',e.date,false,65)}</td>
      <td style="vertical-align:top">${C('pe',`${p.id}:${e.id}`,'amount',e.amount,true)}</td>
      <td style="text-align:center;vertical-align:top;padding-top:10px">
        <input type="checkbox" class="ck" data-t="pe" data-id="${p.id}:${e.id}" data-f="paid"${e.paid?' checked':''}>
      </td>
      <td style="vertical-align:top"><button class="xb" data-act="dent" data-id="${p.id}:${e.id}">✕</button></td>
    </tr>
    <tr style="border-bottom:1px solid rgba(255,255,255,.06)">
      <td colspan="5" style="padding:2px 14px 10px 14px">
        <div style="display:flex;align-items:flex-start;gap:6px">
          <span style="font-size:12px;color:var(--mut2);margin-top:3px;flex-shrink:0">📝</span>
          <div style="flex:1">
            ${C('pe',`${p.id}:${e.id}`,'notes',e.notes||'',false)}
            ${!hasNotes?`<span style="font-size:11px;color:var(--mut2);font-style:italic">clica para adicionar notas, links ou confirmações…</span>`:''}
          </div>
        </div>
      </td>
    </tr>`;
  }).join('');

  const pb=p.budget>0?`
  <div>
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--mut);margin-bottom:5px">
      <span>Progresso do orçamento (total previsto vs orçamento)</span>
      <span style="font-weight:700;color:${prog>100?'var(--red)':prog>80?'var(--accent)':'var(--green)'}">${prog.toFixed(0)}%</span>
    </div>
    <div class="pt"><div class="pf" style="width:${prog}%;background:${prog>100?'var(--red)':prog>80?'var(--accent)':'var(--green)'}"></div></div>
  </div>`:''

  return`<div class="grid">
  <div style="display:flex;align-items:center;gap:14px">
    <button class="ab" data-act="cproj">‹ Voltar</button>
    <span style="font-family:var(--fs);font-size:20px;color:var(--accent);font-weight:600">${esc(p.name)}</span>
  </div>

  <div class="mgrid">
    <div class="mcard">
      <div class="ml">Orçamento</div>
      ${C('pb',p.id,'budget',p.budget,true)}
    </div>
    <div class="mcard">
      <div class="ml">Total Previsto</div>
      <div class="w9" style="font-size:18px">${fmt(tot)}</div>
    </div>
    <div class="mcard">
      <div class="ml">Pago</div>
      <div class="w9 g" style="font-size:18px">${fmt(paid)}</div>
    </div>
    <div class="mcard" style="border-color:rgba(232,164,74,.3)">
      <div class="ml" style="color:var(--accent)">Falta Pagar</div>
      <div class="w9" style="font-size:18px;color:${faltaPagar<=0?'var(--green)':'var(--accent)'}">${fmt(Math.max(0,faltaPagar))}</div>
      <div style="font-size:10px;color:var(--mut2);margin-top:3px">Orçamento − Pago</div>
    </div>
    <div class="mcard">
      <div class="ml">Por Pagar (planeado)</div>
      <div class="w9" style="font-size:18px;color:${unpaid>0?'var(--red)':'var(--green)'}">${fmt(unpaid)}</div>
      <div style="font-size:10px;color:var(--mut2);margin-top:3px">Total − Pago</div>
    </div>
    <div class="mcard">
      <div class="ml">Restante do Orçamento</div>
      <div class="w9" style="font-size:18px;color:${rest>=0?'var(--green)':'var(--red)'}">${fmt(rest)}</div>
      <div style="font-size:10px;color:var(--mut2);margin-top:3px">Orçamento − Total previsto</div>
    </div>
  </div>

  ${pb}

  <div class="card">
    <table>
      <thead><tr>
        <th style="width:38%">Descrição + Notas</th>
        <th>Data</th>
        <th>Valor</th>
        <th style="text-align:center">Pago</th>
        <th style="width:36px"></th>
      </tr></thead>
      <tbody>${rows||`<tr><td colspan="5" style="text-align:center;padding:30px;color:var(--mut2)">Sem entradas.</td></tr>`}</tbody>
    </table>
    <div class="brow"><button class="ab" data-act="aent" data-id="${p.id}">+ Adicionar Entrada</button></div>
  </div>
</div>`;
}

// ── EDIÇÃO INLINE ─────────────────────────────────────────────────────────────
function editCell(span){
  const t=span.dataset.t,id=span.dataset.id,f=span.dataset.f,num=span.dataset.n==='1';
  let raw;const d=mget();
  if(t==='fc')raw=d.fc[f];
  else if(t==='fx')raw=(d.fixed.find(x=>x.id===id)||{})[f];
  else if(t==='vr')raw=(d.variable.find(x=>x.id===id)||{})[f];
  else if(t==='ex')raw=(d.extras.find(x=>x.id===id)||{})[f];
  else if(t==='pb')raw=(S.projects.find(x=>x.id===id)||{})[f];
  else if(t==='pe'){const[pi,ei]=id.split(':');const p=S.projects.find(x=>x.id===pi);raw=p?(p.entries.find(e=>e.id===ei)||{})[f]:'';}
  else if(t==='in')raw=(S.insurance.find(x=>x.id===id)||{})[f];
  else if(t==='fct'){
    if(id==='_')raw=S.fctable[f];
    else if(id.includes(':')){const[mi,ei]=id.split(':');const m=(S.fctable.months||[]).find(x=>x.id===mi);const e=m?(m.entries||[]).find(x=>x.id===ei):null;raw=e?e[f]:'';}
    else raw=((S.fctable.months||[]).find(x=>x.id===id)||{})[f];
  }
  else if(t==='pw')raw=S.portfolio[f];
  else if(t==='pc')raw=(S.portfolio.categories.find(c=>c.id===id)||{})[f];
  else if(t==='po'){const[ci,ii]=id.split(':');const cats2=(S.portfolio&&S.portfolio.categories)||[];const c=cats2.find(x=>x.id===ci);const itm=c?(c.items||[]).find(i=>i.id===ii):null;raw=itm?itm[f]:'';}
  const inp=document.createElement('input');
  inp.type='text';inp.autocomplete='off';inp.className='ei';
  inp.value=String(raw||'');
  inp.style.width=Math.max(span.offsetWidth+4,num?100:150)+'px';
  let done=false;
  const commit=()=>{
    if(done||S.busy)return;done=true;
    const v=num?toN(inp.value):(inp.value.trim());
    const d2=mget();
    if(t==='fc')mset({...d2,fc:{...d2.fc,[f]:v}});
    else if(t==='fx')mset({...d2,fixed:d2.fixed.map(x=>x.id===id?{...x,[f]:v}:x)});
    else if(t==='vr')mset({...d2,variable:d2.variable.map(x=>x.id===id?{...x,[f]:v}:x)});
    else if(t==='ex')mset({...d2,extras:d2.extras.map(x=>x.id===id?{...x,[f]:v}:x)});
    else if(t==='pb')pset(S.projects.map(p=>p.id===id?{...p,[f]:v}:p));
    else if(t==='pe'){const[pi,ei]=id.split(':');pset(S.projects.map(p=>p.id===pi?{...p,entries:p.entries.map(e=>e.id===ei?{...e,[f]:v}:e)}:p));}
    else if(t==='in'){S.insurance=S.insurance.map(x=>x.id===id?{...x,[f]:v}:x);saveLS();}
    else if(t==='fct'){
      if(id==='_'){S.fctable={...S.fctable,[f]:v};}
      else if(id.includes(':')){const[mi,ei]=id.split(':');S.fctable.months=(S.fctable.months||[]).map(m=>m.id===mi?{...m,entries:(m.entries||[]).map(e=>e.id===ei?{...e,[f]:v}:e)}:m);}
      else{S.fctable.months=(S.fctable.months||[]).map(m=>m.id===id?{...m,[f]:v}:m);}
      saveLS();
    }
    else if(t==='pw'){S.portfolio={...S.portfolio,[f]:v};saveLS();}
    else if(t==='pc'){if(!S.portfolio)S.portfolio={categories:[]};S.portfolio.categories=(S.portfolio.categories||[]).map(c=>c.id===id?{...c,[f]:v}:c);saveLS();}
    else if(t==='po'){
      const[ci,ii]=id.split(':');
      const finalV=num?toN(String(v)):v;
      if(!S.portfolio)S.portfolio={categories:[]};
      S.portfolio.categories=(S.portfolio.categories||[]).map(c=>
        c.id===ci?{...c,items:(c.items||[]).map(i=>i.id===ii?{...i,[f]:finalV}:i)}:c
      );
      saveLS();
    }
    render();
  };
  span.replaceWith(inp);inp.focus();if(num)inp.select();
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){done=true;render();}});
}

// ── ACÇÕES ────────────────────────────────────────────────────────────────────
function act(a,ds){
  const d=mget();
  if(a==='tab'){S.tab=ds.tab;S.projId=null;render();return;}
  if(a==='prev'){
    if(S.yr===2026&&S.mo===4)return; // min: May 2026
    if(S.mo===0){S.mo=11;S.yr--;}else S.mo--;
    render();return;
  }
  if(a==='next'){
    if(S.yr===2027&&S.mo===4)return; // max: May 2027
    if(S.mo===11){S.mo=0;S.yr++;}else S.mo++;
    render();return;
  }
  if(a==='afx'){mset({...d,fixed:[...d.fixed,{id:uid(),category:ds.cat,name:'Nova despesa',amount:0,dueDay:'',paid:false}]});render();return;}
  if(a==='dfx'){mset({...d,fixed:d.fixed.filter(x=>x.id!==ds.id)});render();return;}
  if(a==='avr'){mset({...d,variable:[...d.variable,{id:uid(),name:'Nova categoria',forecast:0,paid:0}]});render();return;}
  if(a==='dvr'){mset({...d,variable:d.variable.filter(x=>x.id!==ds.id)});render();return;}
  if(a==='aex'){mset({...d,extras:[...d.extras,{id:uid(),name:'',amount:0,paid:false}]});render();return;}
  if(a==='dex'){mset({...d,extras:d.extras.filter(x=>x.id!==ds.id)});render();return;}
  if(a==='cprev'){
    const pm=S.mo===0?11:S.mo-1,py=S.mo===0?S.yr-1:S.yr;
    const prev=S.months[`${py}-${pm}`];
    if(!prev||!prev.fixed.length){alert('Sem despesas fixas no mês anterior.');return;}
    if(!confirm('Copiar despesas fixas do mês anterior?\nAs actuais serão substituídas.'))return;
    mset({...d,fixed:prev.fixed.map(f=>({...f,id:uid(),paid:false}))});render();return;
  }
  if(a==='fillmos'){
    if(!confirm(`Replicar as despesas fixas e previsões de ${MO[S.mo]} para todos os meses de ${S.yr} sem dados?\n(Saldos, extras e notas não são copiados)`))return;
    let n=0;
    for(let m=0;m<12;m++){
      const k=`${S.yr}-${m}`;
      if(!S.months[k]||!S.months[k].fixed.length){
        S.months[k]={
          fixed:d.fixed.map(f=>({...f,id:uid(),paid:false})),
          variable:d.variable.map(v=>({...v,id:uid(),paid:0})),
          extras:[],
          fc:{...d.fc,initialBalance:0,currentBalance:0,balanceNote:'',savingsTransferred:false,notes:''}
        };n++;
      }
    }
    saveLS();alert(`${n} mês(es) preenchido(s) com os valores de ${MO[S.mo]}.`);render();return;
  }
  if(a==='showcat'){
    const area=document.getElementById('ncarea');if(!area)return;
    area.innerHTML=`<input class="ci" id="cinp" placeholder="Nome da nova categoria..." autocomplete="off">
      <button class="ab" id="cbtn" style="margin-left:8px">Criar</button>
      <button id="ccanc" style="background:none;border:none;color:var(--mut2);cursor:pointer;font-size:18px;padding:0 8px">✕</button>`;
    const inp=document.getElementById('cinp');inp.focus();
    const create=()=>{const v=inp.value.trim();if(!v)return;mset({...mget(),fixed:[...mget().fixed,{id:uid(),category:v,name:'Nova despesa',amount:0,dueDay:'',paid:false}]});render();};
    document.getElementById('cbtn').onclick=create;
    document.getElementById('ccanc').onclick=()=>render();
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')create();if(e.key==='Escape')render();});
    return;
  }
  if(a==='ains'){S.insurance.push({id:uid(),name:'Novo seguro',amount:0,apolice:'',auth:'',period:'mensal',account:''});saveLS();render();return;}
  if(a==='dins'){if(!confirm('Eliminar seguro?'))return;S.insurance=S.insurance.filter(x=>x.id!==ds.id);saveLS();render();return;}
  if(a==='syins'||a==='syinsall'){
    const keys=a==='syinsall'?Object.keys(S.months):[mkey()];
    keys.forEach(k=>{
      if(!S.months[k])S.months[k]=newMonth();
      const other=S.months[k].fixed.filter(f=>f.category!=='Seguros');
      const insF=S.insurance.map(i=>({id:uid(),category:'Seguros',name:i.name,amount:i.amount,dueDay:'',paid:false}));
      S.months[k]={...S.months[k],fixed:[...other,...insF]};
    });
    saveLS();
    alert(`Seguros sincronizados ${a==='syinsall'?`em ${Object.keys(S.months).length} meses`:'neste mês'}.`);
    render();return;
  }
  // FORECAST TABLE
  if(a==='agoal'){
    if(!S.fctable.goals)S.fctable.goals=[];
    const maxYr=S.fctable.goals.reduce((m,g)=>Math.max(m,g.year||0),2026);
    S.fctable.goals.push({id:uid(),year:maxYr+1,target:0});
    saveLS();render();return;
  }
  if(a==='dgoal'){
    S.fctable.goals=(S.fctable.goals||[]).filter(g=>g.id!==ds.gid);
    saveLS();render();return;
  }
  if(a==='afcm'){
    const months=S.fctable.months||[];
    let mo=4,yr=2026; // default: Maio 2026
    if(months.length){
      const last=months[months.length-1];
      if(last.moIdx!==undefined){
        mo=(last.moIdx+1)%12;
        yr=last.moIdx===11?last.moYr+1:last.moYr;
      }
    }
    if(!S.fctable.months)S.fctable.months=[];
    S.fctable.months.push({id:uid(),name:MO[mo]+' '+yr,moIdx:mo,moYr:yr,entries:[]});
    saveLS();render();return;
  }
  if(a==='dfcm'){
    if(!confirm('Eliminar este mês e todas as suas entradas?'))return;
    S.fctable.months=(S.fctable.months||[]).filter(m=>m.id!==ds.id);
    saveLS();render();return;
  }
  if(a==='afce'){
    const tp=ds.tp||'proveito';
    S.fctable.months=(S.fctable.months||[]).map(m=>
      m.id===ds.id?{...m,entries:[...(m.entries||[]),{id:uid(),name:'',amount:0,type:tp}]}:m
    );
    saveLS();render();return;
  }
  if(a==='dfce'){
    const[mi,ei]=ds.id.split(':');
    S.fctable.months=(S.fctable.months||[]).map(m=>
      m.id===mi?{...m,entries:(m.entries||[]).filter(e=>e.id!==ei)}:m
    );
    saveLS();render();return;
  }
  if(a==='tfce'){
    const[mi,ei]=ds.id.split(':');
    S.fctable.months=(S.fctable.months||[]).map(m=>
      m.id===mi?{...m,entries:(m.entries||[]).map(e=>
        e.id===ei?{...e,type:e.type==='proveito'?'despesa':'proveito'}:e
      )}:m
    );
    saveLS();render();return;
  }
  if(a==='acat'){const n=prompt('Nome da categoria:');if(!n||!n.trim())return;S.portfolio.categories.push({id:uid(),name:n.trim(),items:[]});saveLS();render();return;}
  if(a==='dcat'){if(!confirm('Eliminar categoria e todos os seus itens?'))return;S.portfolio.categories=S.portfolio.categories.filter(c=>c.id!==ds.id);saveLS();render();return;}
  if(a==='apit'){S.portfolio.categories=S.portfolio.categories.map(c=>c.id===ds.id?{...c,items:[...c.items,{id:uid(),name:'',amount:0,sign:'+'}]}:c);saveLS();render();return;}
  if(a==='dpit'){const[ci,ii]=ds.id.split(':');S.portfolio.categories=S.portfolio.categories.map(c=>c.id===ci?{...c,items:c.items.filter(i=>i.id!==ii)}:c);saveLS();render();return;}
  if(a==='tpit'){const[ci,ii]=ds.id.split(':');S.portfolio.categories=S.portfolio.categories.map(c=>c.id===ci?{...c,items:c.items.map(i=>i.id===ii?{...i,sign:i.sign==='+'?'-':'+'}:i)}:c);saveLS();render();return;}
  if(a==='aproj'){const n=prompt('Nome do projecto:');if(!n||!n.trim())return;pset([...S.projects,{id:uid(),name:n.trim(),budget:0,entries:[]}]);render();return;}
  if(a==='dproj'){if(!confirm('Eliminar projecto?'))return;pset(S.projects.filter(p=>p.id!==ds.id));if(S.projId===ds.id)S.projId=null;render();return;}
  if(a==='oproj'){S.projId=ds.id;render();return;}
  if(a==='cproj'){S.projId=null;render();return;}
  if(a==='aent'){pset(S.projects.map(p=>p.id===ds.id?{...p,entries:[...p.entries,{id:uid(),name:'',amount:0,paid:false,date:'',notes:''}]}:p));render();return;}
  if(a==='dent'){const[pi,ei]=ds.id.split(':');pset(S.projects.map(p=>p.id===pi?{...p,entries:p.entries.filter(e=>e.id!==ei)}:p));render();return;}
}

// ── EVENTOS ───────────────────────────────────────────────────────────────────
// Carteira native input handlers (blur to save, live update on input)
// Single blur handler — save + re-render for all native inputs
document.addEventListener('blur',e=>{
  // Portfolio category name
  const pcat=e.target.closest('.pi-cat');
  if(pcat){
    const cid=pcat.dataset.cid;
    if(!S.portfolio)S.portfolio={categories:[]};
    S.portfolio.categories=(S.portfolio.categories||[]).map(c=>c.id===cid?{...c,name:pcat.value.trim()}:c);
    saveLS();render();return;
  }
  // Portfolio item name
  const pname=e.target.closest('.pi-name');
  if(pname){
    const cid=pname.dataset.cid,iid=pname.dataset.iid;
    if(!S.portfolio)S.portfolio={categories:[]};
    S.portfolio.categories=(S.portfolio.categories||[]).map(c=>c.id===cid?{...c,items:(c.items||[]).map(i=>i.id===iid?{...i,name:pname.value.trim()}:i)}:c);
    saveLS();render();return;
  }
  // Portfolio item amount
  const pamt=e.target.closest('.pi-amt');
  if(pamt){
    const cid=pamt.dataset.cid,iid=pamt.dataset.iid;
    const v=parseFloat(pamt.value)||0;
    if(!S.portfolio)S.portfolio={categories:[]};
    S.portfolio.categories=(S.portfolio.categories||[]).map(c=>c.id===cid?{...c,items:(c.items||[]).map(i=>i.id===iid?{...i,amount:v}:i)}:c);
    saveLS();render();return;
  }
  // Forecast goal fields
  const gi=e.target.closest('.goal-inp');
  if(gi){
    const gid=gi.dataset.gid,fld=gi.dataset.fld;
    const v=fld==='year'?parseInt(gi.value)||2026:parseFloat(gi.value)||0;
    if(!S.fctable.goals)S.fctable.goals=[];
    S.fctable.goals=S.fctable.goals.map(g=>g.id===gid?{...g,[fld]:v}:g);
    saveLS();render();return;
  }
},true); // capture phase catches blur on all descendants

document.addEventListener('click',e=>{
  // Close Firebase modal on backdrop click
  const fbm=document.getElementById('fb-modal');
  if(fbm&&e.target===fbm){closeFbModal();return;}
  const sp=e.target.closest('.ec');if(sp){editCell(sp);return;}
  const tb=e.target.closest('.tab');if(tb){act('tab',{tab:tb.dataset.tab});return;}
  if(e.target.id==='btnPrev'){act('prev',{});return;}
  if(e.target.id==='btnNext'){act('next',{});return;}
  const btn=e.target.closest('[data-act]');if(btn){act(btn.dataset.act,btn.dataset);return;}
});
document.addEventListener('change',e=>{
  const ck=e.target.closest('.ck');if(!ck)return;
  const t=ck.dataset.t,id=ck.dataset.id,f=ck.dataset.f;
  const d=mget();
  if(t==='fc')mset({...d,fc:{...d.fc,[f]:ck.checked}});
  else if(t==='fx')mset({...d,fixed:d.fixed.map(x=>x.id===id?{...x,[f]:ck.checked}:x)});
  else if(t==='ex')mset({...d,extras:d.extras.map(x=>x.id===id?{...x,[f]:ck.checked}:x)});
  else if(t==='pe'){const[pi,ei]=id.split(':');pset(S.projects.map(p=>p.id===pi?{...p,entries:p.entries.map(e=>e.id===ei?{...e,[f]:ck.checked}:e)}:p));}
  render();
});

// ── ARRANQUE ──────────────────────────────────────────────────────────────────
loadLS();
if(!S.insurance.length)S.insurance=defaultInsurance();
initMonths();
render();
// Init Firebase if config saved
try{const fbcfg=localStorage.getItem('gf:fbcfg');if(fbcfg)initFirebase(JSON.parse(fbcfg));}catch{}
